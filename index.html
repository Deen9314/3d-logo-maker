<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D GIF Maker Pro - ZZ Soft</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    <style>
        :root { --primary: #059669; --bg: #0b1120; --text-dark: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; text-align: center; }
        .main-tool-card { max-width: 1100px; margin: 20px auto; background: #fff; border-radius: 15px; display: grid; grid-template-columns: 320px 1fr 300px; gap: 20px; padding: 25px; color: var(--text-dark); }
        #canvas-box { width: 300px; height: 300px; background: #eee; border: 1px solid #ddd; margin: 0 auto; }
        .btn-upload-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .anim-box { height: 300px; overflow-y: auto; border: 1px solid #ddd; background: white; border-radius: 6px; }
        .anim-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; text-align: left; color: #333; }
        .anim-item.active { background: #e2e8f0; color: #059669; font-weight: bold; }
        .btn-final-download { background: #27ae60; color: white; border: none; padding: 20px 80px; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; margin: 40px 0; }
        .btn-final-download:disabled { background: #95a5a6; }
        @media (max-width: 900px) { .main-tool-card { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header><h1>3D Logo GIF Maker</h1></header>

<div class="main-tool-card">
    <div class="col-preview">
        <div id="canvas-box"></div>
        <input type="file" id="imageInput" hidden accept="image/*">
        <button class="btn-upload-main" onclick="document.getElementById('imageInput').click()">Upload Logo</button>
    </div>

    <div class="col-list">
        <div class="anim-box">
            <div class="anim-item active" data-geo="plane" data-anim="360s">360 Spin</div>
            <div class="anim-item" data-geo="cube" data-anim="cube_h">Rotating Cube</div>
            <div class="anim-item" data-geo="sphere" data-anim="sphere">Rotating Sphere</div>
        </div>
    </div>

    <div class="col-custom">
        <label style="color:#333; font-weight:bold;">Animation Speed</label>
        <input type="range" id="speedRange" min="1" max="50" value="15" style="width:100%;">
    </div>
</div>

<button class="btn-final-download" id="captureBtn">Download Gif</button>

<script>
    let scene, camera, renderer, mesh, globalTexture = null;
    let activeAnim = '360s', activeGeo = 'plane';

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.z = 10;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(300, 300);
        document.getElementById('canvas-box').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        updateMesh('plane');
        animate();
    }

    function updateMesh(type) {
        if(mesh) scene.remove(mesh);
        let geo = (type === 'plane') ? new THREE.BoxGeometry(5, 5, 0.1) : 
                  (type === 'cube') ? new THREE.BoxGeometry(4.5, 4.5, 4.5) : 
                  new THREE.SphereGeometry(3, 32, 32);
        
        let mats = [];
        for(let i=0; i<6; i++) mats.push(new THREE.MeshStandardMaterial({ color: 0xcccccc, transparent: true, side: THREE.DoubleSide }));
        mesh = new THREE.Mesh(geo, mats);
        scene.add(mesh);
        if(globalTexture) applyTex(globalTexture);
    }

    function applyTex(tex) {
        mesh.material.forEach(m => { m.map = tex; m.color.set(0xffffff); m.needsUpdate = true; });
    }

    function animate() {
        requestAnimationFrame(animate);
        let spd = parseFloat(document.getElementById('speedRange').value) / 600;
        if(mesh) { mesh.rotation.y += spd; if(activeGeo === 'cube') mesh.rotation.x = 0.2; }
        renderer.render(scene, camera);
    }

    document.getElementById('imageInput').onchange = (e) => {
        let reader = new FileReader();
        reader.onload = (ev) => {
            new THREE.TextureLoader().load(ev.target.result, (tex) => {
                globalTexture = tex; applyTex(tex);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.querySelectorAll('.anim-item').forEach(el => {
        el.onclick = function() {
            document.querySelectorAll('.anim-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            activeAnim = this.dataset.anim;
            if(this.dataset.geo !== activeGeo) { activeGeo = this.dataset.geo; updateMesh(activeGeo); }
        };
    });

    // --- MEGA FIX FOR DOWNLOAD ---
    document.getElementById('captureBtn').onclick = function() {
        if (typeof gifshot === 'undefined') { alert("Library not loaded! Please Refresh."); return; }
        
        const btn = this;
        btn.disabled = true;
        let frames = [];
        let count = 0;
        const total = 10; // Sirf 10 frames takay foran download ho

        let timer = setInterval(() => {
            count++;
            btn.innerText = "Capturing: " + Math.round((count/total)*100) + "%";
            renderer.render(scene, camera);
            frames.push(renderer.domElement.toDataURL('image/png'));

            if(count >= total) {
                clearInterval(timer);
                btn.innerText = "Saving File...";
                
                // Final Processing
                gifshot.createGIF({
                    images: frames,
                    gifWidth: 200, // Resolution kam ki hai stability ke liye
                    gifHeight: 200,
                    interval: 0.1,
                    numWorkers: 2 // Is baar 2 workers use kiye hain processing ke liye
                }, function(obj) {
                    if(!obj.error) {
                        const a = document.createElement('a');
                        a.href = obj.image;
                        a.download = '3d-logo-zz.gif';
                        document.body.appendChild(a); // Link add karna zaroori hai
                        a.click();
                        document.body.removeChild(a);
                        btn.innerText = "Download Complete!";
                    } else {
                        alert("Error: " + obj.errorMsg);
                        btn.innerText = "Try Again";
                    }
                    setTimeout(() => { btn.innerText = "Download Gif"; btn.disabled = false; }, 2000);
                });
            }
        }, 150);
    };

    init();
</script>
</body>
</html>
